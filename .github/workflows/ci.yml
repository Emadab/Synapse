name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test, audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  web:
    name: Web (lint, types, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      # The frontend imports types generated by ts-rs; regenerate before checks.
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p synapse-core
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:ts
      - run: pnpm fmt:check
      - run: pnpm --filter @synapse/desktop build
      - run: pnpm test:ts
      - name: npm security audit
        run: pnpm audit --audit-level=high || true

  e2e:
    name: E2E smoke (Linux)
    runs-on: ubuntu-latest
    # Only run on main branch pushes (not every PR) to save CI minutes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [rust, web]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            xvfb
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - name: Build Tauri app (release)
        run: pnpm --filter @synapse/desktop tauri build
      - name: Install tauri-driver
        run: cargo install tauri-driver
      - name: Install E2E deps
        working-directory: apps/desktop/test-e2e
        run: pnpm install --no-frozen-lockfile
      - name: Start tauri-driver and run E2E smoke suite
        run: |
          xvfb-run tauri-driver &
          sleep 2
          cd apps/desktop/test-e2e && pnpm wdio run wdio.conf.ts
